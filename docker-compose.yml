services:
  paper-pulse:
    build: .
    image: yourname/paper-pulse:latest
    container_name: paper-pulse
    restart: unless-stopped

    environment:
      # Timezone
      - TZ=Asia/Shanghai

      # Run once on container start (useful for testing)
      - RUN_ON_START=${RUN_ON_START:-false}
      - WEB_PORT=${WEB_PORT:-8081}

      # ===== Light LLM Configuration (for filtering) =====
      # Use any OpenAI-compatible API
      - LIGHT_LLM_API_BASE=${LIGHT_LLM_API_BASE}
      - LIGHT_LLM_API_KEY=${LIGHT_LLM_API_KEY}
      - LIGHT_LLM_MODEL=${LIGHT_LLM_MODEL}

      # ===== Heavy LLM Configuration (for PDF analysis) =====
      # Gemini via OpenAI-compatible endpoint
      - HEAVY_LLM_API_BASE=${HEAVY_LLM_API_BASE}
      - HEAVY_LLM_API_KEY=${HEAVY_LLM_API_KEY}
      - HEAVY_LLM_MODEL=${HEAVY_LLM_MODEL}

      # ===== EZproxy Configuration (for journal PDFs) =====
      - EZPROXY_BASE_URL=${EZPROXY_BASE_URL}
      - EZPROXY_UID=${EZPROXY_UID}
      - EZPROXY_PIN=${EZPROXY_PIN}
      - EZPROXY_USERNAME_FIELD=${EZPROXY_USERNAME_FIELD:-userid}
      - EZPROXY_PASSWORD_FIELD=${EZPROXY_PASSWORD_FIELD:-password}
      - EZPROXY_SUBMIT_SELECTOR=${EZPROXY_SUBMIT_SELECTOR:-input[type='submit']}

    volumes:
      # Configuration file (optional override)
      - ./config.yaml:/app/config.yaml:ro

      # Persistent storage
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./cache:/app/cache

      # Timezone sync
      - /etc/localtime:/etc/localtime:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8081"

    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import main"]
      interval: 30s
      timeout: 10s
      retries: 3
